<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Login Form | Fun</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="square">
        <i style="--clr:#45a5a5;"></i>
        <i style="--clr:#d34ebd;"></i>
        <i style="--clr:#4f51cf;"></i>

        <div class="login">
            <h2>Login</h2>
            <form action="home.html">
            <div class="inputBx">
                <input type="text" placeholder="Username">
            </div>

            <div class="inputBx">
                <input type="Password" placeholder="Password">
            </div>
            <div class="inputBx">
                <input type="submit" value="Sign in">
            </div>
            </form>
            <div class="links">
                <a href="#">Forget Password</a>
                <a href="#">Signup</a>
            </div>
        </div>

    </div>
</body>
</html>
